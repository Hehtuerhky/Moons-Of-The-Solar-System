<html lang="en">
<head>

    <title>Complete Solar System - Planets, Dwarf Planets & All Moons</title>
</head>
<body>

    // Update summary stats
    function updateStats() {
        let planetMoons = 0;
        let dwarfMoons = 0;
        
        for (let planet in solarSystemData.Planets) {
            planetMoons += solarSystemData.Planets[planet].moons.length;
        }
        for (let dwarf in solarSystemData.DwarfPlanets) {
            dwarfMoons += solarSystemData.DwarfPlanets[dwarf].moons.length;
        }
        
        document.getElementById("stats").innerHTML = `
            <strong>Planets:</strong> 8 &nbsp;|&nbsp;
            <strong>Planet Moons:</strong> ${planetMoons} &nbsp;|&nbsp;
            <strong>Dwarf Planets:</strong> ${Object.keys(solarSystemData.DwarfPlanets).length} &nbsp;|&nbsp;
            <strong>Dwarf Planet Moons:</strong> ${dwarfMoons} &nbsp;|&nbsp;
            <strong>Total Moons:</strong> ${planetMoons + dwarfMoons}
        `;
    }

    // Render planets as a simple list
    function renderPlanets() {
        let html = "";
        
        for (let [planetName, planetData] of Object.entries(solarSystemData.Planets)) {
            html += `<div style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;">`;
            html += `<strong>${planetName}</strong> (Planet diameter: ${planetData.diameter.toLocaleString()} km)<br>`;
            
            if (planetData.moons.length > 0) {
                html += `<ul>`;
                for (let moon of planetData.moons) {
                    html += `<li><strong>${moon[0]}</strong> — ${moon[1].toLocaleString()} km</li>`;
                }
                html += `</ul>`;
            } else {
                html += `<i>No moons</i>`;
            }
            html += `</div>`;
        }
        
        document.getElementById("planetsList").innerHTML = html;
    }

    // Render dwarf planets as a simple list
    function renderDwarves() {
        let html = "";
        
        for (let [dwarfName, dwarfData] of Object.entries(solarSystemData.DwarfPlanets)) {
            html += `<div style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;">`;
            html += `<strong>${dwarfName}</strong> (Dwarf planet diameter: ${dwarfData.diameter.toLocaleString()} km)<br>`;
            
            if (dwarfData.moons.length > 0) {
                html += `<ul>`;
                for (let moon of dwarfData.moons) {
                    html += `<li><strong>${moon[0]}</strong> — ${moon[1].toLocaleString()} km</li>`;
                }
                html += `</ul>`;
            } else {
                html += `<i>No moons</i>`;
            }
            html += `</div>`;
        }
        
        document.getElementById("dwarfList").innerHTML = html;
    }
    
    updateStats();
    renderPlanets();
    renderDwarves();
</script>

</body>
</html>
